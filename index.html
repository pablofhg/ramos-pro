<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Portal Ramos PRO | v1.9.2 Semáforo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: #1e293b; font-size: 13px; }
    .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
    .input-field { background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 0.75rem; padding: 0.6rem 0.8rem; width: 100%; outline: none; font-size: 13px; }
    .input-field:focus { border-color: #2563eb; background: white; }
    .search-field { background: white; border: 2px solid #e2e8f0; border-radius: 1rem; padding: 0.8rem 1rem; width: 100%; outline: none; font-weight: 600; }
    .filter-select { background: white; border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 0.5rem; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; width: 100%; }
    .modal { display: none; position: fixed; inset: 0; z-index: 50; background: rgba(15, 23, 42, 0.7); align-items: flex-end; }
    .modal.active { display: flex; animation: slideUp 0.2s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; transition: all 0.3s; }
    .label-tag { font-weight: 800; font-size: 9px; text-transform: uppercase; tracking-widest text-slate-400 block mb-1; }
    .status-badge { font-weight: 900; font-size: 9px; padding: 4px 8px; border-radius: 6px; color: black; text-transform: uppercase; }
    .btn-call { background: #22c55e; color: white; border-radius: 0.75rem; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .btn-maps { background: #475569; color: white; border-radius: 0.6rem; padding: 4px 8px; font-size: 9px; font-weight: 800; display: flex; items-center; gap: 4px; }
    .history-line { border-left: 2px solid #e2e8f0; padding-left: 10px; margin-left: 5px; position: relative; }
    .history-dot { position: absolute; left: -6px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: #cbd5e1; }
    
    /* ESTILOS SEMÁFORO */
    @keyframes blink-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .alerta-roja { border: 2.5px solid #ef4444 !important; background: #fef2f2 !important; }
    .badge-rojo { background: #ef4444; color: white; animation: blink-red 0.8s infinite; }
    .alerta-naranja { border: 2.5px solid #f59e0b !important; background: #fffbeb !important; }
    .badge-naranja { background: #f59e0b; color: white; }
  </style>
</head>
<body>

  <div id="loader" class="fixed inset-0 z-[100] bg-white flex items-center justify-center transition-opacity duration-500"><div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div></div>

  <div id="view-app" class="hidden min-h-screen pb-10">
    <header class="glass sticky top-0 px-5 py-3 flex justify-between items-center z-40">
      <div>
        <p class="text-[9px] font-black text-blue-600 uppercase tracking-widest" id="user-role-badge">Operario</p>
        <h2 class="text-lg font-extrabold tracking-tight" id="user-display-name">...</h2>
      </div>
      <button onclick="auth.signOut()" class="text-slate-400 font-bold text-[10px] tracking-widest">SALIR</button>
    </header>

    <main class="p-4 space-y-4 max-w-xl mx-auto">
      <button onclick="abrirRegistro()" class="w-full bg-slate-900 p-4 rounded-2xl text-white shadow-lg flex items-center gap-4">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black text-xl">+</div>
        <div class="text-left"><h3 class="font-black text-sm uppercase">Nueva Medición</h3></div>
      </button>

      <div class="relative"><input type="text" id="main-search" placeholder="Buscar cliente..." class="search-field"></div>

      <div class="bg-white p-3 rounded-2xl border border-slate-200 space-y-3">
        <div class="grid grid-cols-2 gap-2">
            <select id="f-estado" class="filter-select"><option value="">Estado: Todos</option><option value="PENDIENTE">Pendientes</option><option value="ACEPTADA">Aceptadas</option><option value="FINALIZADA">Finalizadas</option></select>
            <select id="f-tipo" class="filter-select"><option value="">Tipo: Todos</option><option value="PRESUPUESTO">Presupuesto</option><option value="PEDIDO">Pedido</option><option value="COLOCACION">Colocación</option></select>
        </div>
        <div id="admin-filters" class="hidden border-t pt-2"><select id="f-empleado" class="filter-select"><option value="">Empleado: Todos</option></select></div>
        <button onclick="limpiarFiltros()" class="w-full text-[9px] font-black text-blue-600 uppercase tracking-widest pt-1 text-center">Limpiar Filtros ×</button>
      </div>

      <div id="lista-mediciones" class="space-y-4"></div>
    </main>
  </div>

  <div id="modal-historial" class="modal p-4"><div class="bg-white w-full rounded-[2rem] p-6 max-w-lg mx-auto overflow-y-auto max-h-[80vh]"><h2 class="text-xl font-black mb-6 tracking-tighter">Historial</h2><div id="cronologia" class="space-y-4"></div><button onclick="cerrarModal('modal-historial')" class="w-full py-4 bg-slate-900 text-white font-black rounded-xl uppercase text-[10px] mt-6">Cerrar</button></div></div>

  <div id="modal-registro" class="modal p-4">
    <div class="bg-white w-full rounded-[2rem] p-6 max-w-lg mx-auto overflow-y-auto max-h-[90vh]">
      <h2 id="reg-titulo" class="text-xl font-black mb-4 tracking-tighter">Ficha de Obra</h2>
      <input type="hidden" id="edit-id">
      <div class="space-y-3">
        <div class="grid grid-cols-2 gap-2">
          <div><label class="label-tag ml-1">Cliente</label><input type="text" id="m-cliente" class="input-field"></div>
          <div><label class="label-tag ml-1">Teléfono</label><input type="tel" id="m-telefono" class="input-field"></div>
        </div>
        <div><label class="label-tag ml-1">Calle</label><input type="text" id="m-calle" class="input-field"></div>
        <div class="grid grid-cols-3 gap-2">
          <div><label class="label-tag ml-1">Nº</label><input type="text" id="m-numero" class="input-field"></div>
          <div><label class="label-tag ml-1">Piso</label><input type="text" id="m-piso" class="input-field"></div>
          <div><label class="label-tag ml-1">Población</label><input type="text" id="m-poblacion" class="input-field"></div>
        </div>
        <div><label class="label-tag ml-1">Tipo de Trabajo</label><select id="m-tipo" class="input-field font-bold"><option value="PRESUPUESTO">Presupuesto</option><option value="PEDIDO">Pedido</option><option value="COLOCACION">Colocación</option></select></div>
        <div><label class="label-tag ml-1">Descripción Oficina</label><textarea id="m-notas" class="input-field h-20 resize-none"></textarea></div>
        <button id="btn-guardar" class="w-full py-4 bg-blue-600 text-white font-black rounded-xl uppercase text-[10px] tracking-widest mt-2 shadow-lg">Guardar Registro</button>
        <button onclick="cerrarModal('modal-registro')" class="w-full text-slate-400 font-bold text-[10px] uppercase mt-2">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="modal-estado" class="modal p-4">
    <div class="bg-white w-full rounded-[2rem] p-6 max-w-lg mx-auto">
      <h2 id="estado-titulo" class="text-xl font-black mb-4">...</h2>
      <input type="hidden" id="target-id"><input type="hidden" id="target-action">
      <div id="campos-cita" class="hidden space-y-2"><label class="label-tag">Programar Cita</label><input type="datetime-local" id="m-fecha-cita" class="input-field font-bold"></div>
      <div id="campos-obs" class="hidden space-y-2"><label class="label-tag" id="label-obs">Notas del Operario</label><textarea id="m-obs-final" class="input-field h-28 resize-none" placeholder="Escribe aquí..."></textarea></div>
      <button id="btn-confirmar-estado" class="w-full py-4 bg-slate-900 text-white font-black rounded-xl uppercase text-[10px] mt-4 shadow-xl">Confirmar</button>
      <button onclick="cerrarModal('modal-estado')" class="w-full text-slate-400 font-bold text-[10px] uppercase mt-4">Volver</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, updateDoc, collection, onSnapshot, addDoc, serverTimestamp, query, orderBy, deleteDoc, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCHDOl-lmGik9mkXACm2iaehqc4dggCthU", authDomain: "portal-cristaleria-ramos.firebaseapp.com", projectId: "portal-cristaleria-ramos", storageBucket: "portal-cristaleria-ramos.firebasestorage.app", messagingSenderId: "704418876939", appId: "1:704418876939:web:c3284b3b5b7fa75973010e" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let obrasCargadas = [];
    let isAdmin = false;

    onAuthStateChanged(auth, user => {
      document.getElementById('loader').classList.add('hidden');
      if (user) {
        document.getElementById('view-app').classList.remove('hidden');
        document.getElementById('user-display-name').innerText = user.email.split('@')[0].toUpperCase();
        isAdmin = (user.email === 'pablo@cristaleriaramos.es');
        if(isAdmin) {
          document.getElementById('admin-filters').classList.remove('hidden');
          document.getElementById('user-role-badge').innerText = "Super Admin";
        }
        escucharMediciones();
      } else { window.location.href = "login.html"; }
    });

    function escucharMediciones() {
      onSnapshot(query(collection(db, "mediciones"), orderBy("fechaCreacion", "desc")), snap => {
        obrasCargadas = [];
        let empleados = new Set();
        snap.forEach(d => {
          const data = { id: d.id, ...d.data() };
          obrasCargadas.push(data);
          if(data.asignadoA) empleados.add(data.asignadoA);
        });
        actualizarSelectEmpleados(empleados);
        renderizarLista();
      });
    }

    function actualizarSelectEmpleados(set) {
      const s = document.getElementById('f-empleado');
      const val = s.value;
      s.innerHTML = '<option value="">Empleado: Todos</option>';
      set.forEach(e => s.innerHTML += `<option value="${e}">${e.split('@')[0].toUpperCase()}</option>`);
      s.value = val;
    }

    function calcularDiferenciaDias(fechaInicio, fechaFin) {
      if(!fechaInicio || !fechaFin) return null;
      const inicio = fechaInicio.toDate ? fechaInicio.toDate() : new Date(fechaInicio);
      const fin = fechaFin.toDate ? fechaFin.toDate() : new Date(fechaFin);
      const diff = Math.floor((fin - inicio) / (1000 * 60 * 60 * 24));
      return diff === 0 ? "Hoy" : `${diff} d`;
    }

    function renderizarLista() {
      const texto = document.getElementById('main-search').value.toLowerCase();
      const estado = document.getElementById('f-estado').value;
      const tipo = document.getElementById('f-tipo').value;
      const empleado = document.getElementById('f-empleado').value;
      const listado = document.getElementById('lista-mediciones');
      listado.innerHTML = "";
      
      const filtradas = obrasCargadas.filter(m => {
        const matchT = (m.cliente||"").toLowerCase().includes(texto) || (m.direccion?.calle||"").toLowerCase().includes(texto);
        return matchT && (estado===""||m.estado===estado) && (tipo===""||m.tipo===tipo) && (empleado===""||m.asignadoA===empleado);
      });

      filtradas.forEach(m => {
        // LÓGICA SEMÁFORO
        const fEntrada = m.fechaCreacion?.toDate ? m.fechaCreacion.toDate() : new Date();
        const hoy = new Date();
        const diasEspera = Math.floor((hoy - fEntrada) / (1000 * 60 * 60 * 24));
        
        let claseAlerta = "";
        let badgeUrgencia = "";
        if(m.estado === 'PENDIENTE') {
            if(diasEspera >= 3) {
                claseAlerta = "alerta-roja";
                badgeUrgencia = `<span class="badge-rojo text-[8px] font-black px-2 py-1 rounded ml-2 uppercase">Urgencia Alta (${diasEspera}d)</span>`;
            } else if(diasEspera >= 2) {
                claseAlerta = "alerta-naranja";
                badgeUrgencia = `<span class="badge-naranja text-[8px] font-black px-2 py-1 rounded ml-2 uppercase">Aviso (${diasEspera}d)</span>`;
            }
        }

        const tReaccion = calcularDiferenciaDias(m.fechaCreacion, m.fechaAceptacion);
        const tEjecucion = calcularDiferenciaDias(m.fechaAceptacion, m.fechaFinalizacion);
        const colorTipo = m.tipo === 'PRESUPUESTO' ? 'text-amber-600' : (m.tipo === 'PEDIDO' ? 'text-blue-600' : 'text-rose-600');
        const mapsLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(m.direccion.calle + ' ' + m.direccion.numero + ' ' + m.direccion.poblacion)}`;

        listado.innerHTML += `
          <div class="card p-5 space-y-3 ${claseAlerta}">
            <div class="flex justify-between items-center border-b pb-2">
              <div class="flex items-center">
                <span class="status-badge ${m.estado==='PENDIENTE'?'bg-amber-400':m.estado==='ACEPTADA'?'bg-green-400':'bg-blue-400'}">${m.estado}</span>
                ${badgeUrgencia}
              </div>
              <span class="font-black text-[9px] uppercase text-slate-400">${fEntrada.toLocaleDateString()}</span>
            </div>

            <div class="flex justify-between items-center">
              <div>
                <span class="label-tag">Cliente</span>
                <h4 class="text-base font-black text-slate-800 leading-none">${m.cliente}</h4>
                <p class="text-[11px] font-bold text-slate-500 mt-1">${m.telefono}</p>
                <p class="text-[10px] font-black ${colorTipo} mt-1 uppercase tracking-tighter">${m.tipo} ${m.asignadoA?'| '+m.asignadoA.split('@')[0].toUpperCase():''}</p>
              </div>
              <a href="tel:${m.telefono}" class="btn-call flex items-center justify-center">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
              </a>
            </div>

            <div class="flex items-center justify-between bg-slate-50 p-2 rounded-lg gap-2">
              <div class="text-[11px] font-bold text-slate-600 truncate">${m.direccion.calle}, ${m.direccion.numero} - ${m.direccion.poblacion}</div>
              <a href="${mapsLink}" target="_blank" class="btn-maps flex-shrink-0">MAPS</a>
            </div>

            <div><span class="label-tag">Descripción Oficina</span><p class="text-[11px] text-slate-500 italic leading-tight">"${m.notas || 'Sin descripción'}"</p></div>

            ${m.observacionesHistorial && m.observacionesHistorial.length > 0 ? `
              <div class="space-y-1">
                <span class="label-tag text-blue-600">Historial / Operarios:</span>
                <div class="bg-blue-50 p-3 rounded-xl border-l-4 border-blue-300 space-y-2">
                  ${m.observacionesHistorial.map(obs => `<p class="text-[10px] text-blue-900 font-bold leading-tight border-b border-blue-100 pb-1 last:border-0">${obs}</p>`).join('')}
                </div>
              </div>` : ''}

            ${isAdmin ? `
              <div class="flex gap-2 border-t pt-2 border-slate-100">
                <div class="flex-1 bg-slate-50 p-2 rounded-lg text-center"><p class="label-tag">Reacción</p><p class="font-black text-xs text-slate-700">${tReaccion || '...'}</p></div>
                <div class="flex-1 bg-slate-50 p-2 rounded-lg text-center"><p class="label-tag">Medición</p><p class="font-black text-xs text-slate-700">${tEjecucion || '...'}</p></div>
                <button onclick="verHistorial('${m.id}')" class="bg-blue-50 text-blue-600 px-3 rounded-lg text-[9px] font-black uppercase">Historial</button>
              </div>
            ` : ''}

            ${m.fechaCita ? `<p class="text-[9px] font-black text-green-600 uppercase text-center bg-green-50 py-2 rounded-lg border border-green-100 italic">Cita: ${m.fechaCita.replace('T', ' ')}</p>` : ''}

            <div class="grid grid-cols-2 gap-2 pt-1">
              <button onclick="editarObra('${m.id}')" class="bg-slate-100 text-slate-600 py-3 rounded-xl font-black text-[9px] uppercase">Editar</button>
              ${m.estado === 'PENDIENTE' ? `<button onclick="prepararEstado('${m.id}', 'ACEPTADA')" class="bg-slate-900 text-white py-3 rounded-xl font-black text-[9px] uppercase">Aceptar</button>` : ''}
              ${m.estado === 'ACEPTADA' ? `<button onclick="prepararEstado('${m.id}', 'FINALIZADA')" class="bg-blue-600 text-white py-3 rounded-xl font-black text-[9px] uppercase">Finalizar</button>` : ''}
              ${m.estado === 'ACEPTADA' ? `<button onclick="prepararEstado('${m.id}', 'RECHAZAR')" class="bg-rose-50 text-rose-600 py-3 rounded-xl font-black text-[9px] uppercase">Rechazar</button>` : ''}
            </div>
            ${isAdmin ? `<button onclick="eliminarObra('${m.id}')" class="w-full text-red-400 font-black text-[8px] uppercase pt-1 opacity-40">Eliminar Ficha Definitivamente</button>` : ''}
          </div>`;
      });
    }

    // GESTIÓN DE ESTADOS Y FIREBASE
    window.confirmarEstado = async (id, accionActual) => {
      const user = auth.currentUser.email.split('@')[0].toUpperCase();
      const obsInput = document.getElementById('m-obs-final').value;
      let updates = { historial: arrayUnion({ evento: `Estado: ${accionActual}`, fecha: new Date(), user: user }) };
      
      if(accionActual === 'ACEPTADA') { 
        updates.estado = 'ACEPTADA'; updates.asignadoA = auth.currentUser.email; updates.fechaAceptacion = serverTimestamp(); updates.fechaCita = document.getElementById('m-fecha-cita').value; 
      }
      if(accionActual === 'FINALIZADA') { 
        updates.estado = 'FINALIZADA'; updates.fechaFinalizacion = serverTimestamp(); if(obsInput) updates.observacionesHistorial = arrayUnion(`✅ FINALIZADA por ${user}: "${obsInput}"`);
      }
      if(accionActual === 'RECHAZAR') { 
        updates.estado = 'PENDIENTE'; updates.asignadoA = null; updates.fechaCita = null; updates.fechaAceptacion = null;
        if(obsInput) updates.observacionesHistorial = arrayUnion(`❌ RECHAZADA por ${user}: "${obsInput}"`);
        else updates.observacionesHistorial = arrayUnion(`❌ RECHAZADA por ${user} sin motivo.`);
      }

      await updateDoc(doc(db, "mediciones", id), updates);
      cerrarModal('modal-estado');
    };

    window.prepararEstado = (id, accion) => {
      document.getElementById('target-id').value = id;
      document.getElementById('target-action').value = accion;
      document.getElementById('m-obs-final').value = "";
      document.getElementById('campos-cita').classList.toggle('hidden', accion !== 'ACEPTADA');
      document.getElementById('campos-obs').classList.toggle('hidden', accion === 'ACEPTADA');
      if(accion === 'ACEPTADA') document.getElementById('estado-titulo').innerText = 'Asignar Cita';
      if(accion === 'FINALIZADA') document.getElementById('estado-titulo').innerText = 'Finalizar Obra';
      if(accion === 'RECHAZAR') document.getElementById('estado-titulo').innerText = 'Motivo del Rechazo';
      abrirModal('modal-estado');
    };

    window.eliminarObra = async (id) => { if(confirm("¿Eliminar definitivamente esta obra?")) await deleteDoc(doc(db, "mediciones", id)); };
    
    // FUNCIONES BASE
    window.cerrarModal = (id) => document.getElementById(id).classList.remove('active');
    window.abrirModal = (id) => document.getElementById(id).classList.add('active');
    window.limpiarFiltros = () => { document.getElementById('main-search').value = ""; document.getElementById('f-estado').value = ""; document.getElementById('f-tipo').value = ""; if(isAdmin) document.getElementById('f-empleado').value = ""; renderizarLista(); };
    window.abrirRegistro = () => { document.getElementById('reg-titulo').innerText = "Nueva Entrada"; document.getElementById('edit-id').value = ""; document.querySelectorAll('#modal-registro input, #modal-registro textarea').forEach(i => i.value = ""); abrirModal('modal-registro'); };
    document.getElementById('btn-guardar').addEventListener('click', async () => { const id = document.getElementById('edit-id').value; const user = auth.currentUser.email.split('@')[0].toUpperCase(); const data = { cliente: document.getElementById('m-cliente').value, telefono: document.getElementById('m-telefono').value, direccion: { calle: document.getElementById('m-calle').value, numero: document.getElementById('m-numero').value, piso: document.getElementById('m-piso').value, poblacion: document.getElementById('m-poblacion').value }, tipo: document.getElementById('m-tipo').value, notas: document.getElementById('m-notas').value }; if(id) { data.historial = arrayUnion({ evento: "Edición", fecha: new Date(), user: user }); await updateDoc(doc(db, "mediciones", id), data); } else { data.estado = "PENDIENTE"; data.fechaCreacion = serverTimestamp(); data.observacionesHistorial = []; data.historial = [{ evento: "Registro", fecha: new Date(), user: user }]; await addDoc(collection(db, "mediciones"), data); } cerrarModal('modal-registro'); });
    window.editarObra = async (id) => { const docSnap = await getDoc(doc(db, "mediciones", id)); const m = docSnap.data(); document.getElementById('edit-id').value = id; document.getElementById('m-cliente').value = m.cliente; document.getElementById('m-telefono').value = m.telefono; document.getElementById('m-calle').value = m.direccion.calle; document.getElementById('m-numero').value = m.direccion.numero; document.getElementById('m-piso').value = m.direccion.piso || ""; document.getElementById('m-poblacion').value = m.direccion.poblacion; document.getElementById('m-tipo').value = m.tipo; document.getElementById('m-notas').value = m.notas; abrirModal('modal-registro'); };
    window.verHistorial = async (id) => { const docSnap = await getDoc(doc(db, "mediciones", id)); const m = docSnap.data(); const crono = document.getElementById('cronologia'); crono.innerHTML = ""; (m.historial || []).forEach(log => { const fecha = log.fecha?.toDate ? log.fecha.toDate().toLocaleString() : new Date(log.fecha).toLocaleString(); crono.innerHTML += `<div class="history-line"><div class="history-dot"></div><p class="text-[10px] font-black text-blue-600 uppercase">${fecha}</p><p class="text-xs font-bold text-slate-800">${log.evento}</p><p class="text-[10px] text-slate-400 font-bold uppercase">Por: ${log.user}</p></div>`; }); abrirModal('modal-historial'); };
    document.getElementById('btn-confirmar-estado').addEventListener('click', () => confirmarEstado(document.getElementById('target-id').value, document.getElementById('target-action').value));
    ['main-search', 'f-estado', 'f-tipo', 'f-empleado'].forEach(id => { document.getElementById(id)?.addEventListener('input', () => renderizarLista()); document.getElementById(id)?.addEventListener('change', () => renderizarLista()); });
    window.auth = auth;
  </script>
</body>
